<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 220" role="img" aria-labelledby="title desc">
  <title id="title">NC State University logo</title>
  <desc id="desc">Red NC State University wordmark-style logo.</desc>
  <rect width="520" height="220" rx="18" fill="#cc0000"/>
  <g fill="#fff" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <text x="260" y="100" font-size="76" font-weight="900" letter-spacing="2">NC STATE</text>
    <rect x="95" y="124" width="330" height="5" fill="#fff" opacity="0.85"/>
    <text x="260" y="166" font-size="30" font-weight="700" letter-spacing="7">UNIVERSITY</text>
  </g>
</svg>
